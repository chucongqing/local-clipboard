<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Local Clipboard</title>
    <link
      rel="stylesheet"
      href="/styles.css"
    />
  </head>
  <body>
    <div
      id="updateBanner"
      class="update-banner"
      style="display: none"
    >
      <div class="update-content">
        <span class="update-icon">🔔</span>
        <span class="update-text">
          New version <strong id="latestVersion"></strong> available!
        </span>
        <button
          id="downloadUpdate"
          class="update-btn"
        >
          Download
        </button>
        <button
          id="dismissUpdate"
          class="update-dismiss"
        >
          ✕
        </button>
      </div>
    </div>

    <div class="container">
      <h1>📋 Local Clipboard</h1>
      <div
        id="roomName"
        class="room-name"
        style="display: none"
      ></div>
      <div class="room-actions">
        <button
          id="newRoomBtn"
          class="room-action-btn primary"
        >
          🔒 New Private Room
        </button>
        <button
          id="copyRoomUrlBtn"
          class="room-action-btn"
        >
          📋 Copy Room URL
        </button>
      </div>
      <div
        id="status"
        class="status disconnected"
      >
        Connecting...
      </div>

      <div
        id="qrSection"
        class="qr-section"
      >
        <div class="qr-header">
          <span class="qr-title">📱 Connect Another Device</span>
          <button
            id="qrToggle"
            class="qr-toggle"
          >
            Show QR Code
          </button>
        </div>
        <div
          id="qrContainer"
          class="qr-container collapsed"
        >
          <img
            src="/qr"
            alt="QR Code"
            class="qr-image"
            loading="eager"
            id="qrImage"
          />
          <p class="qr-hint">Scan this code with your phone to connect</p>
        </div>
      </div>

      <div
        id="autoClearBar"
        class="auto-clear-bar"
      >
        <div class="auto-clear-left">
          <label
            for="intervalSelect"
            class="auto-clear-label"
            >Auto-clear:</label
          >
          <select
            id="intervalSelect"
            class="auto-clear-select"
          >
            <option value="0">Never</option>
            <option value="1">1 min</option>
            <option value="5">5 min</option>
            <option
              value="10"
              selected
            >
              10 min
            </option>
            <option value="30">30 min</option>
            <option value="60">1 hour</option>
            <option value="120">2 hours</option>
          </select>
        </div>
        <div class="auto-clear-right">
          <span
            id="countdownDisplay"
            class="countdown-display"
            style="display: none"
          ></span>
          <button
            id="pauseResumeBtn"
            class="auto-clear-btn pause-resume-btn"
            style="display: none"
            title="Pause timer"
          >
            ⏸
          </button>
          <button
            id="clearNowBtn"
            class="auto-clear-btn clear-now-btn"
            title="Clear all messages now"
          >
            Clear
          </button>
        </div>
      </div>

      <div
        class="messages"
        id="messages"
      >
        <div class="empty-state">No messages yet. Start typing!</div>
      </div>

      <div class="input-area">
        <div class="input-row">
          <textarea
            id="messageInput"
            placeholder="Type your message... (Shift+Enter for new line, paste files/images)"
            disabled
            autocomplete="off"
            dir="auto"
            rows="3"
          ></textarea>
          <div class="input-buttons">
            <input
              type="file"
              id="fileInput"
              accept="*/*"
              multiple
              disabled
              style="display: none"
            />
            <label
              for="fileInput"
              id="fileLabel"
              class="icon-btn"
              >📎</label
            >
            <button
              id="sendButton"
              class="icon-btn"
              disabled
            >
              ➤
            </button>
          </div>
        </div>
        <div
          id="fileAttachments"
          class="file-attachments"
          style="display: none"
        ></div>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-content">
        <span class="version">v{{VERSION}}</span>
        <span class="separator">•</span>
        <span class="credits">
          Made with <span class="heart">❤️</span> by
          <a
            href="https://github.com/chucongqing/local-clipboard"
            target="_blank"
            rel="noopener noreferrer"
            >CCQ</a
          >
          and
          <a
            href="https://github.com/MoKhajavi75/local-clipboard"
            target="_blank"
            rel="noopener noreferrer"
            >MoKhajavi75</a
          >
        </span>
      </div>
    </footer>

    <div
      id="dropOverlay"
      class="drop-overlay"
      style="display: none"
    >
      <div class="drop-overlay-content">
        <span class="drop-overlay-icon">📎</span>
        <span class="drop-overlay-text">Drop files here to share</span>
      </div>
    </div>

    <div
      id="imageLightbox"
      class="image-lightbox"
      style="display: none"
    >
      <button
        id="lightboxClose"
        class="lightbox-close"
        aria-label="Close"
      >
        ×
      </button>
      <img
        id="lightboxImage"
        class="lightbox-image"
        src=""
        alt="Preview"
      />
      <a
        id="lightboxDownload"
        class="lightbox-download"
        href="#"
        download
      >
        Download
      </a>
    </div>

    <script src="/script.js"></script>
  </body>
</html>
